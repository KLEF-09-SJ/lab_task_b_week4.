<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veritas University Orientation Portal</title>
</head>
<body>

    <h2>Student Orientation Registration Form</h2>
   

    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <!-- Full Name -->
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required><br><br>

            <!-- Matric Number -->
            <label for="matric">Matric Number:</label><br>
            <input type="text" id="matric" name="matric" placeholder="Enter your matric number" required><br><br>

            <!-- Email -->
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <!-- Age -->
            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age" placeholder="Enter your age" required><br><br>

            <!-- Gender -->
            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male" required> Male
            <input type="radio" name="gender" value="female"> Female
            <br><br>

            <!-- Date of Birth -->
            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br><br>

        </fieldset>

        <fieldset>
            <legend>Academic Information</legend>

            <!-- Faculty -->
            <label for="faculty">Select Faculty:</label><br>
            <select id="faculty" name="faculty" required>
                <option value="">--Select Faculty--</option>
                <option value="science">Science</option>
                <option value="arts">Arts</option>
                <option value="engineering">Engineering</option>
                <option value="law">Law</option>
                <option value="management">Management Sciences</option>
            </select><br><br>

        </fieldset>

        <fieldset>
            <legend>Documents Submitted</legend>

            <input type="checkbox" name="documents" value="birth_certificate"> Birth Certificate<br>
            <input type="checkbox" name="documents" value="waec_result"> WAEC Result<br>
            <input type="checkbox" name="documents" value="admission_letter"> Admission Letter<br>
            <input type="checkbox" name="documents" value="id_card"> ID Card<br><br>

            <!-- File Upload -->
            <label for="file">Upload Passport/Document:</label><br>
            <input type="file" id="file" name="file" required><br><br>

        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>

            <!-- Text Area -->
            <label for="comments">Comments / Questions:</label><br>
            <textarea id="comments" name="comments" rows="4" cols="40" placeholder="Enter any additional info..."></textarea>

        </fieldset>

        <br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

        <p><strong>Name: JOHN SAMUEL OCHE.</strong></p>
        <p><strong>Matric Number: VUG/SEN/25/14052.</strong></p>

    </form>

</body>
</html>
