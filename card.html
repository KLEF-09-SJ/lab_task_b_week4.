<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>


    <link rel="stylesheet" href="card.css">
</head>
<body>

    <div class="card">


        <div class="profile-header">
            <h1 id="studentName">Sammy Jay</h1>
            <p class="bio">
                Passionate student who enjoys coding, design, and learning new technologies.
            </p>
        </div>


        <hr>


        <div class="details">
            <h3>Student Details</h3>
            <p><strong>Email:</strong> sammy@email.com</p>
            <p><strong>Location:</strong> Lagos, Nigeria</p>
            <p><strong>Course:</strong> Software enginnering</p>
        </div>


        <div class="actions">

            <button style="background-color: green; color: white;">
                Contact Me
            </button>
        </div>

    </div>

</body>
</html>
